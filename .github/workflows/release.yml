name: Build Installers

# Builds real native installers (.exe / .msi, .dmg, .AppImage / .deb) for
# Windows, macOS and Linux and attaches them to a GitHub Release.
#
# How to trigger:
#   * Push a version tag:  git tag v0.1.0 && git push origin v0.1.0
#   * Or run it from the Actions tab ("Run workflow") and enter a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS build targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Generate the source icon
        run: python3 scripts/generate-icon.py

      - name: Generate all icon sizes
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "AI Screen Control ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            ## AI Screen Control — Installers

            Download the installer for your operating system, then run it:

            * **Windows** — `.msi` or `.exe` (setup)
            * **macOS** — `.dmg` (drag to Applications)
            * **Linux** — `.AppImage` (make executable and run) or `.deb`

            After installing, open the app, click Settings, and paste your AI API key.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
